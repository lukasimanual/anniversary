<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anniversary</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  font-family:Poppins, sans-serif;
  overflow:hidden;
  text-align:center;
}

/* container */
.container{
  position:relative;
  width:300px;
  height:300px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

/* love kecil */
.small-heart{
  position:absolute;
  top:50%;
  left:50%;
  font-size:22px;
  color:red;
  transform:translate(-50%,-50%);
  animation:merge 2.5s forwards;
}

/* animasi menuju tengah */
@keyframes merge{
  from{
    transform:translate(calc(-50% + var(--x)), calc(-50% + var(--y)));
    opacity:1;
  }
  to{
    transform:translate(-50%, -50%);
    opacity:1;
  }
}

/* love besar */
.big-heart{
  font-size:130px;
  color:red;
  margin-top:20px;
  opacity:0;
  animation:appear 1s forwards, flip3d 4s 1s infinite linear;
  transform-style:preserve-3d;
}

/* muncul */
@keyframes appear{
  to{opacity:1;}
}

/* flip horizontal 3D */
@keyframes flip3d{
  from{transform:rotateY(0deg);}
  to{transform:rotateY(360deg);}
}

/* text */
.text{
  margin-top:10px;
  font-size:26px;
  color:white;
  opacity:0;
  animation:showText 1.5s 3s forwards;
}

@keyframes showText{
  to{opacity:1;}
}

/* button */
.button{
  margin-top:20px;
  padding:10px 28px;
  border:none;
  border-radius:25px;
  color:white;
  background:#ff4d6d;
  font-size:18px;
  cursor:pointer;
  opacity:0;
  animation:showBtn 1.5s 3.5s forwards;
  margin-top: 10px;
  text-decoration: none;
}

@keyframes showBtn{
  to{opacity:1;}
}

</style>
</head>

<body>

<div class="container" id="hearts"></div>

<script>

const container = document.getElementById("hearts");

/* buat pecahan love */
for(let i=0;i<40;i++){

  let heart=document.createElement("div");
  heart.className="small-heart";
  heart.innerHTML="❤";

  let x=(Math.random()*600-300)+"px";
  let y=(Math.random()*400-200)+"px";

  heart.style.setProperty('--x',x);
  heart.style.setProperty('--y',y);

  container.appendChild(heart);
}

/* setelah menyatu */
setTimeout(()=>{

  container.innerHTML=`
    <div class="big-heart">❤</div>
    <div class="text">happy anniversary yang ke 1 tahun sayang</div>
    <a href="anniv.html" class="button">klik ya</a>
  `;

},2500);

</script>

</body>
</html>
